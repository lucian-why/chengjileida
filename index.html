</head>
<body>
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">☰ 考试列表</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>成绩管家</h1>
                <p>记录每一步进步</p>
            </div>

            <!-- 档案选择器 -->
            <div class="profile-switcher" id="profileSwitcher">
                <select id="profileSelect"></select>
                <button class="profile-manage-btn" id="profileManageBtn" title="管理档案">⚙</button>
            </div>

            <div class="exam-list" id="examList">
                <!-- 考试列表将通过JS渲染 -->
            </div>
            
            <button class="new-exam-btn" id="newExamBtn">
                <span>+</span> 新建考试
            </button>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab active" data-tab="exam">考试详情</button>
                <button class="tab" data-tab="trend">成绩分析</button>
                <button class="tab" data-tab="settings">设置</button>
            </div>

            <!-- 考试详情页 -->
            <div class="content-section active" id="tab-exam">
                <div id="examContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <p>选择一个考试查看详情<br>或新建一个考试</p>
                    </div>
                </div>
            </div>

            <!-- 成绩分析页 -->
            <div class="content-section" id="tab-trend">
                <!-- 分析模式切换 -->
                <div class="chart-tabs" id="analysisModeTabs">
                    <button class="chart-tab active" data-mode="score">📊 分数趋势</button>
                    <button class="chart-tab" data-mode="rank">🏅 排名趋势</button>
                    <button class="chart-tab" data-mode="radar">🎯 科目对比</button>
                </div>

                <!-- 分数趋势 / 排名趋势 -->
                <div class="card" id="trendCard">
                    <button class="chart-zoom-btn" onclick="openChartZoom('trend')" title="放大查看">⛶</button>
                    <div class="chart-secondary-row">
                        <div class="chart-tabs" id="chartTabs">
                            <button class="chart-tab active" data-chart="total">总分趋势</button>
                        </div>
                        <select class="rank-type-select" id="rankTypeSelect" style="display: none;">
                            <option value="class">班级排名</option>
                            <option value="grade">年级排名</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>

                <!-- 科目对比（雷达图） -->
                <div class="card" id="radarCard" style="display: none;">
                    <button class="chart-zoom-btn" onclick="openChartZoom('radar')" title="放大查看">⛶</button>
                    <div class="radar-header">
                        <div class="radar-header-title">当前：<span id="radarCurrentExamName">--</span></div>
                        <div class="radar-compare-area">
                            <div class="radar-compare-chips" id="radarCompareChips">
                                <!-- 对比考试 chip 将由JS渲染 -->
                            </div>
                            <div class="radar-compare-hint" id="radarCompareHint">点击选择考试进行对比（最多2场）</div>
                        </div>
                    </div>
                    <div class="radar-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                    <div class="radar-summary" id="radarSummary" style="display: none;">
                        <div class="radar-summary-item best">
                            <span class="radar-summary-icon">🏆</span>
                            <span class="radar-summary-label">最强</span>
                            <span class="radar-summary-name" id="radarBestName">--</span>
                            <span class="radar-summary-detail" id="radarBestDetail">--</span>
                            <span class="radar-summary-rate best-rate" id="radarBestRate">--%</span>
                        </div>
                        <div class="radar-summary-item worst">
                            <span class="radar-summary-icon">💪</span>
                            <span class="radar-summary-label">最弱</span>
                            <span class="radar-summary-name" id="radarWorstName">--</span>
                            <span class="radar-summary-detail" id="radarWorstDetail">--</span>
                            <span class="radar-summary-rate worst-rate" id="radarWorstRate">--%</span>
                        </div>
                    </div>
                    <div class="radar-empty" id="radarEmpty" style="display: none;">
                        <p>选择考试后查看各科得分率分析</p>
                    </div>
                </div>

            </div>

            <!-- 设置页 -->
            <div class="content-section" id="tab-settings">
                <!-- 档案管理 -->
                <div class="card">
                    <h2 class="card-title">档案管理</h2>
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">
                        每个档案是独立的成绩空间，适合区分不同孩子或不同学习阶段。
                    </p>
                    <div id="profileList">
                        <!-- 档案列表将由JS渲染 -->
                    </div>
                    <div id="addProfileArea">
                        <button class="btn-small" id="addProfileBtn" style="margin-top: 10px; background: var(--accent-green); color: #fff; border-color: var(--accent-green);">+ 新建档案</button>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">数据管理</h2>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">添加示例数据</div>
                            <div class="setting-desc">一键添加测试数据</div>
                        </div>
                        <button class="btn-small" id="demoBtn" style="background: var(--accent-green); color: #fff; border-color: var(--accent-green);">添加</button>
                    </div>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">导出数据</div>
                            <div class="setting-desc">导出为Excel文件</div>
                        </div>
                        <button class="btn-small" id="exportBtn">导出</button>
                    </div>
                    <div class="setting-item">
                        <div>
                            <div class="setting-label">导入数据</div>
                            <div class="setting-desc">从Excel文件导入</div>
                        </div>
                        <button class="btn-small" id="importBtn">导入</button>
                        <input type="file" id="importFile" accept=".xlsx,.xls" style="display: none;">
                    </div>
                    
                </div>
            </div>
        </main>
    </div>

    <!-- 新建考试模态框 -->
    <div class="modal-overlay" id="examModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="examModalTitle">新建考试</h3>
                <button class="modal-close" id="examModalClose">×</button>
            </div>
            <form id="examForm">
                <div class="form-group">
                    <label>考试名称 *</label>
                    <input type="text" id="examName" placeholder="如：2026年3月月考" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="examStartDate">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="examEndDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="examNotes" rows="2" placeholder="可选备注"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>班级排名（总分）</label>
                        <input type="number" id="examTotalClassRank" placeholder="选填" min="1">
                    </div>
                    <div class="form-group">
                        <label>年级排名（总分）</label>
                        <input type="number" id="examTotalGradeRank" placeholder="选填" min="1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>班级人数 <span style="font-size:0.75rem;color:var(--text-secondary);font-weight:normal;">(可选)</span></label>
                        <input type="number" id="examClassTotal" placeholder="选填" min="1">
                    </div>
                    <div class="form-group">
                        <label>年级人数 <span style="font-size:0.75rem;color:var(--text-secondary);font-weight:normal;">(可选)</span></label>
                        <input type="number" id="examGradeTotal" placeholder="选填" min="1">
                    </div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" id="examModalCancel" style="flex:1;">取消</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加成绩模态框 -->
    <div class="modal-overlay" id="scoreModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="scoreModalTitle">添加成绩</h3>
                <button class="modal-close" id="scoreModalClose">×</button>
            </div>
            <form id="scoreForm">
                <div class="form-group">
                    <label>科目 *</label>
                    <input type="text" id="subjectName" placeholder="如：数学" required list="subjectList">
                    <datalist id="subjectList">
                        <option value="语文">
                        <option value="数学">
                        <option value="英语">
                        <option value="物理">
                        <option value="化学">
                        <option value="生物">
                        <option value="历史">
                        <option value="地理">
                        <option value="政治">
                    </datalist>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>成绩 *</label>
                        <input type="number" id="scoreValue" placeholder="分数" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>满分</label>
                        <input type="number" id="scoreFull" value="100" min="1" onchange="updateScoreMax()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>班级排名</label>
                        <input type="number" id="scoreClassRank" placeholder="选填" min="1">
                    </div>
                    <div class="form-group">
                        <label>年级排名</label>
                        <input type="number" id="scoreGradeRank" placeholder="选填" min="1">
                    </div>
                </div>
                <div class="form-group">
                    <label>备注（可选）</label>
                    <input type="text" id="scoreNotes" placeholder="如：粗心大意扣5分">
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-secondary" id="scoreModalCancel" style="flex:1;">取消</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 批量填写弹窗 -->
    <div class="modal-overlay" id="batchModal">
        <div class="modal batch-modal">
            <div class="modal-header">
                <h3 class="modal-title">📝 批量填写成绩</h3>
                <button class="modal-close" id="batchModalClose">&times;</button>
            </div>
            <div class="batch-body">
                <div class="batch-table-wrap">
                    <table class="batch-table">
                        <thead>
                            <tr>
                                <th class="batch-col-name">科目</th>
                                <th class="batch-col-score">成绩</th>
                                <th class="batch-col-rank">班排名</th>
                                <th class="batch-col-rank">年排名</th>
                                <th class="batch-col-del"></th>
                            </tr>
                        </thead>
                        <tbody id="batchTableBody"></tbody>
                    </table>
                </div>
                <div class="batch-add-row">
                    <input type="text" class="batch-add-input" id="newBatchSubject" placeholder="输入新科目名称，回车添加">
                    <button type="button" class="batch-add-btn" onclick="addBatchSubject()">添加科目</button>
                </div>
            </div>
            <div class="form-group" style="margin-bottom:0;display:flex;gap:10px;">
                <button class="btn btn-secondary" id="batchModalCancel" style="flex:1;">取消</button>
                <button class="btn btn-primary" id="batchSaveBtn" style="flex:1;">全部保存</button>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay confirm-modal" id="confirmModal">
        <div class="modal">
            <div class="confirm-icon-wrap danger" id="confirmModalIconWrap">
                <span id="confirmModalIcon">⚠️</span>
            </div>
            <div class="confirm-title" id="confirmModalTitle">确定删除？</div>
            <div class="confirm-message" id="confirmModalMessage">此操作不可撤销</div>
            <div class="confirm-buttons">
                <button class="btn confirm-cancel-btn" id="confirmModalCancel">取消</button>
                <button class="btn confirm-ok-btn" id="confirmModalOk">确定</button>
            </div>
        </div>
    </div>

    <!-- 分享报告预览弹窗 -->
    <div class="report-modal-overlay" id="reportModalOverlay">
        <div class="report-modal">
            <div class="report-modal-header">
                <h3>📷 预览分享报告</h3>
                <button class="report-modal-close" onclick="closeShareReport()">×</button>
            </div>
            <div class="report-preview-area" id="reportPreviewArea">
                <p style="color: var(--text-secondary);">正在生成报告...</p>
            </div>
            <div class="report-modal-actions">
                <button class="btn-cancel-report" onclick="closeShareReport()">取消</button>
                <button class="btn-download" onclick="downloadReport()">💾 保存图片</button>
            </div>
        </div>
    </div>

    <!-- 隐藏渲染区域（html2canvas 截图用） -->
    <div id="report-render-wrapper" style="position: fixed; left: -9999px; top: 0; z-index: -1;"></div>

    <!-- 图表放大弹窗 -->
    <div class="chart-zoom-overlay" id="chartZoomOverlay">
        <div class="chart-zoom-container">
            <div class="chart-zoom-header">
                <h3 id="chartZoomTitle">成绩分析</h3>
                <button class="chart-zoom-close" onclick="closeChartZoom()">✕</button>
            </div>
            <div class="chart-zoom-body" id="chartZoomBody">
                <div class="chart-tabs" id="zoomChartTabs"></div>
                <select class="rank-type-select" id="zoomRankTypeSelect" style="display: none; margin-bottom: 12px;">
                    <option value="class">班级排名</option>
                    <option value="grade">年级排名</option>
                </select>
                <div class="chart-container">
                    <canvas id="zoomTrendChart"></canvas>
                </div>
                <div class="radar-container" id="zoomRadarContainer" style="display: none;">
                    <canvas id="zoomRadarChart"></canvas>
                </div>
            </div>
        </div>
    </div>


    <!-- 页脚 -->
    <div style="position: fixed; bottom: 10px; right: 10px; color: var(--text-secondary); font-size: 0.8rem; opacity: 0.7;">
        成绩管家 - 你的专属学习伙伴
    </div>
</body>
</html>
