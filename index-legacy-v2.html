    <script>
        // ===== 全局状态 =====
        let currentExamId = null;
        let trendChart = null;
        let trendAnalysisMode = 'score'; // 'score' 或 'rank'
        let trendRankType = 'class';     // 'class' 或 'grade'（排名模式下）

        // ===== 数据存储键 =====
        const EXAMS_KEY = 'xueji_exams';
        const PROFILES_KEY = 'xueji_profiles';
        const ACTIVE_PROFILE_KEY = 'xueji_active_profile';

        // ===== 档案操作 =====
        function getProfiles() {
            const data = localStorage.getItem(PROFILES_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveProfiles(profiles) {
            localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
        }

        function getActiveProfileId() {
            return localStorage.getItem(ACTIVE_PROFILE_KEY) || 'default';
        }

        function setActiveProfileId(id) {
            localStorage.setItem(ACTIVE_PROFILE_KEY, id);
        }

        function createProfile(name) {
            const profiles = getProfiles();
            const id = 'profile_' + Date.now();
            profiles.push({ id, name, createdAt: new Date().toISOString() });
            saveProfiles(profiles);
            return id;
        }

        function updateProfile(id, name) {
            const profiles = getProfiles();
            const p = profiles.find(p => p.id === id);
            if (p) { p.name = name; saveProfiles(profiles); }
        }

        function deleteProfile(id) {
            let profiles = getProfiles();
            profiles = profiles.filter(p => p.id !== id);
            saveProfiles(profiles);
            // 同时删除该档案下的考试
            const exams = getExamsAll().filter(e => e.profileId !== id);
            saveExams(exams);
            // 如果删的是当前激活的档案，切换到第一个
            if (getActiveProfileId() === id && profiles.length > 0) {
                setActiveProfileId(profiles[0].id);
            }
        }

        // 迁移旧数据：把没有 profileId 的考试归入默认档案
        function migrateProfilesIfNeeded() {
            const profiles = getProfiles();
            if (profiles.length > 0) return; // 已迁移过

            const exams = getExamsAll();
            if (exams.length === 0) return; // 没有数据不需要迁移

            const defaultId = createProfile('默认档案');
            exams.forEach(e => { e.profileId = defaultId; });
            saveExams(exams);
            setActiveProfileId(defaultId);
        }

        // ===== 考试操作（按档案过滤） =====
        function getExams(profileId, excludeHidden = false) {
            const data = localStorage.getItem(EXAMS_KEY);
            let all = data ? JSON.parse(data) : [];
            if (profileId) all = all.filter(e => e.profileId === profileId);
            if (excludeHidden) all = all.filter(e => !e.excluded);
            return all;
        }

        function getExamsAll() {
            const data = localStorage.getItem(EXAMS_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveExams(exams) {
            localStorage.setItem(EXAMS_KEY, JSON.stringify(exams));
        }

        // 切换考试排除状态
        function toggleExamExclude(examId) {
            const allExams = getExamsAll();
            const exam = allExams.find(e => e.id === examId);
            if (!exam) return;
            exam.excluded = !exam.excluded;
            saveExams(allExams);
            renderExamList();
            // 刷新当前可见的图表
            if (currentExamId) {
                renderExamDetail();
                updateRadarChart();
            }
            updateTrendChart();
            showToast({ icon: exam.excluded ? '🚫' : '✅', iconType: 'info', title: exam.excluded ? '已排除' : '已恢复', message: exam.excluded ? '该考试不计入统计分析' : '该考试重新计入统计' });
        }

        // ===== 渲染考试列表 =====
        async function renderExamList() {
            const profileId = getActiveProfileId();
            const exams = getExams(profileId);
            const container = document.getElementById('examList');
            
            if (exams.length === 0) {
                container.innerHTML = '<div class="empty-state"><p style="font-size: 0.85rem;">暂无考试记录</p></div>';
                return;
            }

            // 按日期倒序
            const sortedExams = [...exams].sort((a, b) => new Date(b.startDate || b.createdAt) - new Date(a.startDate || a.createdAt));

            container.innerHTML = sortedExams.map(exam => {
                const isExpanded = currentExamId === exam.id;
                const subjects = exam.subjects || [];
                const totalScore = subjects.reduce((sum, s) => sum + s.score, 0);
                const isExcluded = exam.excluded;
                
                return `
                    <div class="exam-folder ${isExcluded ? 'is-excluded' : ''} ${isExpanded ? 'expanded' : ''}" data-exam-id="${exam.id}">
                        <div class="exam-folder-header ${currentExamId === exam.id ? 'active' : ''}" onclick="selectExam(${exam.id})">
                            <span class="folder-icon">▶</span>
                            <div class="exam-info">
                                <div class="exam-name">${exam.name}</div>
                                <div class="exam-date">${exam.startDate || '未设置日期'} · ${totalScore}分</div>
                            </div>
                            <div class="exam-actions">
                                <button class="exam-action-btn exclude-btn ${isExcluded ? 'is-excluded' : ''}" onclick="event.stopPropagation(); toggleExamExclude(${exam.id})" title="${isExcluded ? '恢复计入统计' : '排除不计入统计'}">${isExcluded ? '🚫' : '📊'}</button>
                                <button class="exam-action-btn" onclick="event.stopPropagation(); editExam(${exam.id})" title="编辑">✎</button>
                                <button class="exam-action-btn" onclick="event.stopPropagation(); deleteExam(${exam.id})" title="删除">×</button>
                            </div>
                        </div>
                        <div class="exam-subjects">
                            ${subjects.map((s, si) => {
                                const rankTag = s.classRank ? ` 班${s.classRank}` : '';
                                return `
                                <div class="subject-item" onclick="event.stopPropagation(); selectExam(${exam.id})">
                                    <span class="subject-name">📄 ${s.name}</span>
                                    <span class="subject-score ${s.score >= 90 ? 'good' : (s.score >= 60 ? 'normal' : 'bad')}">${s.score}${rankTag}</span>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== 选择考试 =====
        async function selectExam(examId) {
            // 再次点击同一考试则收起
            if (currentExamId === examId) {
                currentExamId = null;
                await renderExamList();
                renderExamDetail();
                updateRadarChart();
                return;
            }
            currentExamId = examId;
            await renderExamList();
            renderExamDetail();
            updateRadarChart();
        }

        // ===== 选择科目 =====
        async function selectSubject(examId, subjectName) {
            currentExamId = examId;
            await renderExamList();
            renderExamDetail();
            // 可以在这里显示单科的详细信息
        }

        // ===== 渲染考试详情 =====
        async function renderExamDetail() {
            const exams = getExams(getActiveProfileId());
            const container = document.getElementById('examContent');
            
            if (!currentExamId) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <p>选择一个考试查看详情<br>或新建一个考试</p>
                    </div>
                `;
                return;
            }

            const exam = exams.find(e => e.id === currentExamId);
            if (!exam) {
                container.innerHTML = '<div class="empty-state"><p>考试不存在</p></div>';
                return;
            }

            const subjects = exam.subjects || [];
            const totalScore = subjects.reduce((sum, s) => sum + s.score, 0);

            // 构建总分旁的排名标签
            const totalRankTags = [];
            if (exam.totalClassRank) totalRankTags.push(`班${exam.totalClassRank}`);
            if (exam.totalGradeRank) totalRankTags.push(`校${exam.totalGradeRank}`);

            container.innerHTML = `
                <div class="exam-overview">
                    <div class="overview-card">
                        <div class="label">考试名称</div>
                        <div class="value">${exam.name}</div>
                    </div>
                    <div class="overview-card">
                        <div class="label">总分</div>
                        <div class="value highlight">${totalScore}</div>
                        ${totalRankTags.length > 0 ? `<div class="overview-rank-tags">${totalRankTags.map(r => `<span class="rank-tag">${r}</span>`).join('')}</div>` : ''}
                    </div>
                </div>

                <div style="margin-bottom: 16px;"><button class="share-report-btn" onclick="openShareExamReport()">📤 分享考试报告</button></div>

                ${exam.startDate ? `<p style="color: var(--text-secondary); margin-bottom: 20px;">📅 ${exam.startDate}${exam.endDate && exam.endDate !== exam.startDate ? ' ~ ' + exam.endDate : ''}</p>` : ''}
                
                ${exam.notes ? `<p style="color: var(--text-secondary); margin-bottom: 20px; font-style: italic;">${exam.notes}</p>` : ''}

                <div class="card">
                    <div class="card-title-row">
                        <h2 class="card-title" style="margin-bottom:0;">各科成绩</h2>
                        <button class="batch-inline-btn" onclick="openBatchModal()">📝 批量填写</button>
                    </div>
                    <div class="subject-cards">
                        ${subjects.map((s, index) => {
                            let rankHtml = '';
                            if (s.classRank) rankHtml += `<span class="rank-tag">班${s.classRank}</span>`;
                            if (s.gradeRank) rankHtml += `<span class="rank-tag">校${s.gradeRank}</span>`;
                            return `
                            <div class="subject-card" onclick="editSubjectScore(${index})">
                                <div class="name">${s.name}</div>
                                <div class="score ${s.score >= 90 ? 'good' : (s.score >= 60 ? 'normal' : 'bad')}">${s.score}</div>
                                ${rankHtml ? `<div class="rank-info">${rankHtml}</div>` : ''}
                            </div>
                        `}).join('')}
                        <div class="add-subject-btn" onclick="openScoreModal()">
                            <span style="font-size: 1.5rem;">+</span>
                            <span>添加成绩</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== 雷达图 =====
        let radarChart = null;
        let selectedCompareIds = []; // 已选对比考试ID列表（存数字类型）

        // 雷达图配色：当前(红) + 对比1(蓝) + 对比2(橙)，高对比不冲突
        const RADAR_COMPARE_STYLES = [
            { bg: 'rgba(50, 120, 210, 0.12)',  border: '#3278D2', fill: true,  borderWidth: 3, pointRadius: 5, pointHoverRadius: 7, pointStyle: 'rect' },
            { bg: 'rgba(240, 160, 50, 0.12)',  border: '#F0A032', fill: true,  borderWidth: 3, pointRadius: 5, pointHoverRadius: 7, pointStyle: 'triangle' },
        ];

        function initRadarChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    animation: {
                        duration: 800,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                padding: 14,
                                usePointStyle: true,
                                pointStyleWidth: 10,
                                font: { size: 12 }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    if (ctx.raw === null || ctx.raw === undefined) return null;
                                    const isCurrent = ctx.dataset._isCurrent;
                                    if (!isCurrent) {
                                        // 对比考试：只显示考试名和得分率，不显示详细分数排名（防误触）
                                        return ctx.dataset.label + ': ' + ctx.raw + '%';
                                    }
                                    const meta = ctx.dataset._subjectMeta;
                                    if (!meta) return ctx.dataset.label + ': ' + ctx.raw + '%';
                                    const info = meta[ctx.dataIndex];
                                    if (!info) return null;
                                    let text = ctx.dataset.label + ': ' + info.score + '/' + info.fullScore;
                                    if (info.classRank) text += '  班' + info.classRank;
                                    if (info.gradeRank) text += '  校' + info.gradeRank;
                                    return text;
                                }
                            },
                            filter: function(tooltipItem) {
                                return tooltipItem.raw !== null && tooltipItem.raw !== undefined;
                            }
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20,
                                font: { size: 11 },
                                color: 'var(--text-secondary)',
                                backdropColor: 'transparent'
                            },
                            pointLabels: {
                                font: { size: 13, weight: '500' },
                                color: 'var(--text-primary)'
                            },
                            grid: {
                                color: 'rgba(128,128,128,0.15)'
                            },
                            angleLines: {
                                color: 'rgba(128,128,128,0.15)'
                            }
                        }
                    }
                }
            });
        }

        function renderRadarCompareChips() {
            const exams = getExams(getActiveProfileId(), true);
            const chipsEl = document.getElementById('radarCompareChips');
            const hintEl = document.getElementById('radarCompareHint');
            const headerEl = document.querySelector('.radar-header');

            if (!currentExamId || exams.length <= 1) {
                headerEl.style.display = 'none';
                return;
            }
            headerEl.style.display = 'flex';

            // 按日期倒序排列
            const sorted = [...exams].sort((a, b) => new Date(b.startDate || b.createdAt) - new Date(a.startDate || a.createdAt));

            // 清理已选：移除不存在的考试ID
            const validIds = sorted.map(e => e.id);
            selectedCompareIds = selectedCompareIds.filter(id => validIds.includes(id) && id !== currentExamId);

            let html = '';
            sorted.forEach((exam, idx) => {
                if (exam.id === currentExamId) {
                    // 当前考试 - 高亮显示
                    html += `<span class="radar-compare-chip current-exam">${exam.name}</span>`;
                } else {
                    const isSelected = selectedCompareIds.includes(exam.id);
                    const isFull = selectedCompareIds.length >= 2 && !isSelected;
                    html += `<span class="radar-compare-chip${isSelected ? ' selected' : ''}${isFull ? ' disabled' : ''}" data-exam-id="${exam.id}" onclick="toggleRadarCompare(${exam.id})">${exam.name}</span>`;
                }
            });

            chipsEl.innerHTML = html;

            // 更新提示
            const count = selectedCompareIds.length;
            if (count === 0) {
                hintEl.textContent = '点击选择考试进行对比（最多2场）';
            } else {
                hintEl.textContent = `已选 ${count}/2 场考试`;
            }
        }

        function toggleRadarCompare(examId) {
            const idx = selectedCompareIds.indexOf(examId);
            if (idx >= 0) {
                selectedCompareIds.splice(idx, 1);
            } else {
                if (selectedCompareIds.length >= 2) return;
                selectedCompareIds.push(examId);
            }
            renderRadarCompareChips();
            updateRadarChart();
        }

        function updateRadarChart() {
            const exams = getExams(getActiveProfileId());
            const container = document.querySelector('.radar-container');
            const emptyEl = document.getElementById('radarEmpty');
            const headerEl = document.querySelector('.radar-header');
            const currentNameEl = document.getElementById('radarCurrentExamName');

            if (!currentExamId || exams.length === 0) {
                container.style.display = 'none';
                emptyEl.style.display = 'block';
                emptyEl.querySelector('p').textContent = '选择考试后查看各科得分率分析';
                headerEl.style.display = 'none';
                if (radarChart) {
                    radarChart.data.labels = [];
                    radarChart.data.datasets = [];
                    radarChart.update();
                }
                return;
            }

            // 当前考试
            const currentExam = exams.find(e => e.id === currentExamId);
            if (!currentExam || !currentExam.subjects || currentExam.subjects.length < 3) {
                container.style.display = 'none';
                emptyEl.style.display = 'block';
                emptyEl.querySelector('p').textContent = '当前考试科目不足3科，无法生成雷达图';
                headerEl.style.display = 'none';
                if (radarChart) {
                    radarChart.data.labels = [];
                    radarChart.data.datasets = [];
                    radarChart.update();
                }
                return;
            }

            // 过滤有满分的科目
            const currentSubjects = currentExam.subjects.filter(s => s.fullScore && s.fullScore > 0);
            if (currentSubjects.length < 3) {
                container.style.display = 'none';
                emptyEl.style.display = 'block';
                emptyEl.querySelector('p').textContent = '至少需要3科有满分数据才能生成雷达图';
                headerEl.style.display = 'none';
                if (radarChart) {
                    radarChart.data.labels = [];
                    radarChart.data.datasets = [];
                    radarChart.update();
                }
                return;
            }

            container.style.display = 'block';
            emptyEl.style.display = 'none';
            currentNameEl.textContent = currentExam.name;

            const labels = currentSubjects.map(s => s.name);
            const currentData = currentSubjects.map(s => Math.round(s.score / s.fullScore * 100));

            // 当前考试的科目元信息（tooltip 用）
            const currentMeta = currentSubjects.map(s => ({
                score: s.score,
                fullScore: s.fullScore,
                classRank: s.classRank || null,
                gradeRank: s.gradeRank || null
            }));

            // 当前考试数据集（红色，实心填充，最大）
            const currentStyle = { bg: 'rgba(232, 100, 60, 0.15)', border: '#E8643C' };
            const datasets = [{
                label: currentExam.name,
                data: currentData,
                _subjectMeta: currentMeta,
                _isCurrent: true,
                backgroundColor: currentStyle.bg,
                borderColor: currentStyle.border,
                borderWidth: 3,
                borderDash: [],
                pointBackgroundColor: currentStyle.border,
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 5,
                pointHoverRadius: 7,
                pointStyle: 'circle',
                fill: true
            }];

            // 对比考试数据集（不填充，不同点样式）
            selectedCompareIds.forEach((compId, i) => {
                const compExam = exams.find(e => e.id === compId);
                if (!compExam) return;
                const compSubjects = compExam.subjects || [];
                const compData = labels.map(name => {
                    const cs = compSubjects.find(s => s.name === name);
                    if (cs && cs.fullScore && cs.fullScore > 0) {
                        return Math.round(cs.score / cs.fullScore * 100);
                    }
                    return null;
                });
                // 对比考试的科目元信息
                const compMeta = labels.map(name => {
                    const cs = compSubjects.find(s => s.name === name);
                    if (cs && cs.fullScore && cs.fullScore > 0) {
                        return { score: cs.score, fullScore: cs.fullScore, classRank: cs.classRank || null, gradeRank: cs.gradeRank || null };
                    }
                    return null;
                });
                const style = RADAR_COMPARE_STYLES[i % RADAR_COMPARE_STYLES.length];
                datasets.push({
                    label: compExam.name,
                    data: compData,
                    _subjectMeta: compMeta,
                    _isCurrent: false,
                    backgroundColor: style.fill ? style.bg : 'transparent',
                    borderColor: style.border,
                    borderWidth: style.borderWidth,
                    borderDash: [],
                    pointBackgroundColor: style.border,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 1.5,
                    pointRadius: style.pointRadius,
                    pointHoverRadius: style.pointHoverRadius,
                    pointStyle: style.pointStyle,
                    fill: style.fill
                });
            });

            // 渲染对比 chip 选择器
            renderRadarCompareChips();

            radarChart.data.labels = labels;
            radarChart.data.datasets = datasets;
            radarChart.update();

            // 最强/最弱科目分析
            const sorted = [...currentSubjects].map(s => ({
                name: s.name, score: s.score, fullScore: s.fullScore,
                rate: s.score / s.fullScore
            })).sort((a, b) => b.rate - a.rate);
            const summaryEl = document.getElementById('radarSummary');
            document.getElementById('radarBestName').textContent = sorted[0].name;
            document.getElementById('radarBestDetail').textContent = sorted[0].score + '/' + sorted[0].fullScore;
            document.getElementById('radarBestRate').textContent = Math.round(sorted[0].rate * 100) + '%';
            const worst = sorted[sorted.length - 1];
            document.getElementById('radarWorstName').textContent = worst.name;
            document.getElementById('radarWorstDetail').textContent = worst.score + '/' + worst.fullScore;
            document.getElementById('radarWorstRate').textContent = Math.round(worst.rate * 100) + '%';
            summaryEl.style.display = 'flex';
        }

        // ===== 图表 =====
        const CHART_COLORS = {
            accent: '#e8a87c',
            accentBg: 'rgba(232, 168, 124, 0.1)',
            blue: '#7ca9c9',
            blueBg: 'rgba(124, 169, 201, 0.1)',
            purple: '#9b8dc4',
            purpleBg: 'rgba(155, 141, 196, 0.1)',
        };

        function initCharts() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '成绩',
                        data: [],
                        borderColor: CHART_COLORS.accent,
                        backgroundColor: CHART_COLORS.accentBg,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: CHART_COLORS.accent,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, min: 0, max: 100, grid: { color: '#f0ebe4' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 加载上次的成绩分析状态
            const saved = localStorage.getItem('xueji_trend_mode');
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    trendAnalysisMode = s.mode || 'score';
                    trendRankType = s.rankType || 'class';
                } catch(e) {}
            }

            // 恢复分析模式的 UI 状态
            document.querySelectorAll('#analysisModeTabs .chart-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.mode === trendAnalysisMode);
            });
            const trendCard = document.getElementById('trendCard');
            const radarCard = document.getElementById('radarCard');
            if (trendAnalysisMode === 'radar') {
                trendCard.style.display = 'none';
                radarCard.style.display = 'block';
            } else {
                trendCard.style.display = 'block';
                radarCard.style.display = 'none';
            }

            // 绑定分析模式切换事件
            document.getElementById('analysisModeTabs').addEventListener('click', function(e) {
                const tab = e.target.closest('.chart-tab');
                if (!tab) return;
                this.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                trendAnalysisMode = tab.dataset.mode;
                saveTrendMode();

                const trendCard = document.getElementById('trendCard');
                const radarCard = document.getElementById('radarCard');

                if (trendAnalysisMode === 'radar') {
                    trendCard.style.display = 'none';
                    radarCard.style.display = 'block';
                    updateRadarChart();
                } else {
                    trendCard.style.display = 'block';
                    radarCard.style.display = 'none';
                    updateChartTabs();
                    updateTrendChart();
                }
            });

            // 绑定排名类型下拉切换
            document.getElementById('rankTypeSelect').addEventListener('change', function() {
                trendRankType = this.value;
                saveTrendMode();
                updateTrendChart();
            });
        }

        function saveTrendMode() {
            localStorage.setItem('xueji_trend_mode', JSON.stringify({
                mode: trendAnalysisMode,
                rankType: trendRankType
            }));
        }

        function updateTrendChart() {
            const exams = getExams(getActiveProfileId(), true);
            const sortedExams = [...exams].sort((a, b) => new Date(a.startDate || a.createdAt) - new Date(b.startDate || b.createdAt));

            // 确保canvas可见（清除可能存在的空状态提示）
            const container = trendChart.canvas.parentElement;
            let hint = container.querySelector('.trend-empty-hint');
            if (hint) hint.style.display = 'none';
            trendChart.canvas.style.display = '';

            if (trendAnalysisMode === 'rank') {
                updateRankChart(sortedExams);
            } else {
                updateScoreChart(sortedExams);
            }
        }

        // 分数趋势模式
        function updateScoreChart(sortedExams) {
            const activeTab = document.querySelector('#chartTabs .chart-tab.active');
            const selectedSubject = activeTab ? activeTab.dataset.subject : null;

            let data, label;
            if (!selectedSubject || activeTab.dataset.chart === 'total') {
                data = sortedExams.map(exam => {
                    const subjects = exam.subjects || [];
                    if (subjects.length === 0) return null;
                    const total = subjects.reduce((sum, s) => sum + s.score, 0);
                    return { name: exam.name, value: total };
                }).filter(e => e !== null);
                label = '总分';
            } else {
                data = sortedExams.map(exam => {
                    const record = (exam.subjects || []).find(s => s.name === selectedSubject);
                    return record ? { name: exam.name, value: record.score } : null;
                }).filter(e => e !== null);
                label = selectedSubject;
            }

            trendChart.data.labels = data.map(e => e.name);
            trendChart.data.datasets[0].data = data.map(e => e.value);
            trendChart.data.datasets[0].label = label;
            trendChart.data.datasets[0].borderColor = CHART_COLORS.accent;
            trendChart.data.datasets[0].backgroundColor = CHART_COLORS.accentBg;
            trendChart.data.datasets[0].pointBackgroundColor = CHART_COLORS.accent;
            trendChart.options.scales.y.reverse = false;
            trendChart.options.scales.y.beginAtZero = false;
            trendChart.options.scales.y.max = undefined;
            trendChart.options.scales.y.title = { display: false };
            trendChart.update();
        }

        // 排名趋势模式
        function updateRankChart(sortedExams) {
            const activeTab = document.querySelector('#chartTabs .chart-tab.active');
            const selectedSubject = activeTab ? activeTab.dataset.subject : null;
            const isTotal = !selectedSubject || activeTab.dataset.chart === 'total';

            // 从下拉列表获取排名类型
            trendRankType = document.getElementById('rankTypeSelect').value;
            const rankKey = trendRankType === 'class' ? 'classRank' : 'gradeRank';
            const rankLabelPrefix = trendRankType === 'class' ? '班级排名' : '年级排名';

            let data;
            if (isTotal) {
                // 总分排名：从 exam 的 totalClassRank/totalGradeRank 取
                const totalRankKey = trendRankType === 'class' ? 'totalClassRank' : 'totalGradeRank';
                data = sortedExams.map(exam => {
                    const rank = exam[totalRankKey];
                    return rank ? { name: exam.name, value: rank } : null;
                }).filter(e => e !== null);
            } else {
                // 单科排名
                data = sortedExams.map(exam => {
                    const record = (exam.subjects || []).find(s => s.name === selectedSubject);
                    const rank = record ? record[rankKey] : null;
                    return rank ? { name: exam.name, value: rank } : null;
                }).filter(e => e !== null);
            }

            trendChart.data.labels = data.map(e => e.name);
            trendChart.data.datasets[0].data = data.map(e => e.value);
            trendChart.data.datasets[0].label = (isTotal ? '总分' : selectedSubject) + ' - ' + rankLabelPrefix;

            // 排名模式样式：班级蓝色，年级紫色
            const color = trendRankType === 'class' ? CHART_COLORS.blue : CHART_COLORS.purple;
            const bgColor = trendRankType === 'class' ? CHART_COLORS.blueBg : CHART_COLORS.purpleBg;
            trendChart.data.datasets[0].borderColor = color;
            trendChart.data.datasets[0].backgroundColor = bgColor;
            trendChart.data.datasets[0].pointBackgroundColor = color;

            // 反转Y轴：名次高的在上方
            trendChart.options.scales.y.reverse = true;
            trendChart.options.scales.y.beginAtZero = false;
            trendChart.options.scales.y.max = undefined;
            trendChart.options.scales.y.title = {
                display: true,
                text: rankLabelPrefix + '（↑ 进步）',
                color: '#6b6560',
                font: { size: 12 }
            };
            trendChart.update();

            // 没有数据时显示提示
            const container = trendChart.canvas.parentElement;
            let hint = container.querySelector('.trend-empty-hint');
            if (data.length === 0) {
                if (!hint) {
                    hint = document.createElement('div');
                    hint.className = 'trend-empty-hint';
                    container.appendChild(hint);
                }
                hint.innerHTML = `<div class="hint-icon">🏅</div><p>暂无排名数据<br>请在考试中填写排名信息</p>`;
                hint.style.display = '';
                trendChart.canvas.style.display = 'none';
            } else {
                if (hint) hint.style.display = 'none';
                trendChart.canvas.style.display = '';
            }
        }

        function updateCharts() {
            updateTrendChart();
        }

        // ===== 图表放大弹窗 =====
        let zoomTrendChart = null;
        let zoomRadarChart = null;

        function openChartZoom(type) {
            const overlay = document.getElementById('chartZoomOverlay');
            const body = document.getElementById('chartZoomBody');
            const titleEl = document.getElementById('chartZoomTitle');
            const zoomTabsEl = document.getElementById('zoomChartTabs');
            const zoomRankSelect = document.getElementById('zoomRankTypeSelect');
            const zoomTrendContainer = body.querySelector('.chart-container');
            const zoomRadarContainer = document.getElementById('zoomRadarContainer');
            const zoomTrendCanvas = document.getElementById('zoomTrendChart');
            const zoomRadarCanvas = document.getElementById('zoomRadarChart');

            if (type === 'trend') {
                titleEl.textContent = trendAnalysisMode === 'rank' ? '🏅 排名趋势' : '📊 分数趋势';
                zoomTrendContainer.style.display = '';
                zoomRadarContainer.style.display = 'none';
                zoomTabsEl.style.display = '';
                zoomRankSelect.style.display = trendAnalysisMode === 'rank' ? '' : 'none';
                zoomRankSelect.value = trendRankType;

                // 复制科目 tabs
                const exams = getExams(getActiveProfileId(), true);
                const subjects = [...new Set(exams.flatMap(e => (e.subjects || []).map(s => s.name)))];
                const activeTab = document.querySelector('#chartTabs .chart-tab.active');
                const selectedSubject = activeTab ? activeTab.dataset.subject : null;

                let tabsHtml = '<button class="chart-tab active" data-chart="total">总分</button>';
                subjects.forEach(s => {
                    tabsHtml += `<button class="chart-tab ${selectedSubject === s ? 'active' : ''}" data-subject="${s}" data-chart="subject">${s}</button>`;
                });
                zoomTabsEl.innerHTML = tabsHtml;
                // 调整 active 状态
                if (selectedSubject) {
                    zoomTabsEl.querySelectorAll('.chart-tab').forEach(t => {
                        t.classList.toggle('active', t.dataset.subject === selectedSubject || (!t.dataset.subject && !selectedSubject));
                    });
                }

                // 销毁旧图表
                if (zoomTrendChart) { zoomTrendChart.destroy(); zoomTrendChart = null; }
                zoomTrendChart = new Chart(zoomTrendCanvas, {
                    type: 'line',
                    data: { labels: [], datasets: [{ data: [], borderWidth: 2, pointRadius: 5, pointHoverRadius: 7, tension: 0.3, fill: false }] },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(ctx) {
                                        return ctx.dataset.label + ': ' + ctx.parsed.y;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: { grid: { color: 'rgba(128,128,128,0.1)' } },
                            y: { beginAtZero: false, grid: { color: 'rgba(128,128,128,0.1)' } }
                        }
                    }
                });

                // 渲染数据
                const sortedExams = [...exams].sort((a, b) => new Date(a.startDate || a.createdAt) - new Date(b.startDate || b.createdAt));
                if (trendAnalysisMode === 'rank') {
                    renderZoomRankChart(sortedExams);
                } else {
                    renderZoomScoreChart(sortedExams);
                }

                // 绑定 tab 切换
                zoomTabsEl.querySelectorAll('.chart-tab').forEach(tab => {
                    tab.addEventListener('click', function() {
                        zoomTabsEl.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                        this.classList.add('active');
                        if (trendAnalysisMode === 'rank') {
                            renderZoomRankChart(sortedExams);
                        } else {
                            renderZoomScoreChart(sortedExams);
                        }
                    });
                });

                // 绑定排名类型切换
                zoomRankSelect.onchange = function() {
                    trendRankType = this.value;
                    saveTrendMode();
                    document.getElementById('rankTypeSelect').value = trendRankType;
                    updateTrendChart();
                    renderZoomRankChart(sortedExams);
                };

            } else if (type === 'radar') {
                titleEl.textContent = '🎯 科目对比';
                zoomTrendContainer.style.display = 'none';
                zoomRadarContainer.style.display = '';
                zoomTabsEl.style.display = 'none';
                zoomRankSelect.style.display = 'none';

                // 销毁旧图表
                if (zoomRadarChart) { zoomRadarChart.destroy(); zoomRadarChart = null; }

                const exams = getExams(getActiveProfileId(), true);
                const currentExam = exams.find(e => e.id === currentExamId);
                if (!currentExam || !currentExam.subjects || currentExam.subjects.length < 3) return;

                const currentSubjects = currentExam.subjects.filter(s => s.fullScore && s.fullScore > 0);
                if (currentSubjects.length < 3) return;

                const labels = currentSubjects.map(s => s.name);
                const currentData = currentSubjects.map(s => Math.round(s.score / s.fullScore * 100));

                const datasets = [{
                    label: currentExam.name,
                    data: currentData,
                    backgroundColor: 'rgba(232, 100, 60, 0.15)',
                    borderColor: '#E8643C',
                    borderWidth: 3,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    pointStyle: 'circle',
                    fill: true
                }];

                // 添加对比考试
                selectedCompareIds.forEach((id, ci) => {
                    const compareExam = exams.find(e => e.id === id);
                    if (!compareExam) return;
                    const style = RADAR_COMPARE_STYLES[ci % RADAR_COMPARE_STYLES.length];
                    const compareSubjects = compareExam.subjects.filter(s => s.fullScore && s.fullScore > 0);
                    const data = labels.map(name => {
                        const s = compareSubjects.find(cs => cs.name === name);
                        return s ? Math.round(s.score / s.fullScore * 100) : null;
                    });
                    datasets.push({
                        label: compareExam.name,
                        data: data,
                        backgroundColor: style.bg,
                        borderColor: style.border,
                        borderWidth: style.borderWidth,
                        pointRadius: style.pointRadius,
                        pointHoverRadius: style.pointHoverRadius,
                        pointStyle: style.pointStyle,
                        fill: style.fill
                    });
                });

                zoomRadarChart = new Chart(zoomRadarCanvas, {
                    type: 'radar',
                    data: { labels, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: {
                            duration: 800,
                            easing: 'easeOutQuart'
                        },
                        plugins: {
                            legend: { display: datasets.length > 1, position: 'bottom', labels: { padding: 20, usePointStyle: true, font: { size: 14 } } },
                            tooltip: {
                                callbacks: {
                                    label: function(ctx) {
                                        return ctx.dataset.label + ': ' + ctx.parsed.r + '%';
                                    }
                                }
                            }
                        },
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 100,
                                ticks: { stepSize: 20, font: { size: 14 }, color: 'var(--text-secondary)', backdropColor: 'transparent' },
                                pointLabels: { font: { size: 16, weight: '500' }, color: 'var(--text-primary)' },
                                grid: { color: 'rgba(128,128,128,0.15)' },
                                angleLines: { color: 'rgba(128,128,128,0.15)' }
                            }
                        }
                    }
                });
            }

            overlay.classList.add('active');
        }

        function renderZoomScoreChart(sortedExams) {
            if (!zoomTrendChart) return;
            const activeTab = document.querySelector('#zoomChartTabs .chart-tab.active');
            const selectedSubject = activeTab ? activeTab.dataset.subject : null;

            let data, label;
            if (!selectedSubject || activeTab.dataset.chart === 'total') {
                data = sortedExams.map(exam => {
                    const subjects = exam.subjects || [];
                    if (subjects.length === 0) return null;
                    const total = subjects.reduce((sum, s) => sum + s.score, 0);
                    return { name: exam.name, value: total };
                }).filter(e => e !== null);
                label = '总分';
            } else {
                data = sortedExams.map(exam => {
                    const record = (exam.subjects || []).find(s => s.name === selectedSubject);
                    return record ? { name: exam.name, value: record.score } : null;
                }).filter(e => e !== null);
                label = selectedSubject;
            }

            zoomTrendChart.data.labels = data.map(e => e.name);
            zoomTrendChart.data.datasets[0].data = data.map(e => e.value);
            zoomTrendChart.data.datasets[0].label = label;
            zoomTrendChart.data.datasets[0].borderColor = CHART_COLORS.accent;
            zoomTrendChart.data.datasets[0].backgroundColor = CHART_COLORS.accentBg;
            zoomTrendChart.data.datasets[0].pointBackgroundColor = CHART_COLORS.accent;
            zoomTrendChart.options.scales.y.reverse = false;
            zoomTrendChart.options.scales.y.beginAtZero = false;
            zoomTrendChart.options.scales.y.max = undefined;
            zoomTrendChart.options.scales.y.title = { display: false };
            zoomTrendChart.update();
        }

        function renderZoomRankChart(sortedExams) {
            if (!zoomTrendChart) return;
            const activeTab = document.querySelector('#zoomChartTabs .chart-tab.active');
            const selectedSubject = activeTab ? activeTab.dataset.subject : null;

            let data, label, rankLabelPrefix;
            if (!selectedSubject || activeTab.dataset.chart === 'total') {
                data = sortedExams.map(exam => {
                    const rank = trendRankType === 'class' ? exam.totalClassRank : exam.totalGradeRank;
                    return rank ? { name: exam.name, value: rank } : null;
                }).filter(e => e !== null);
                rankLabelPrefix = trendRankType === 'class' ? '班级排名' : '年级排名';
                label = '总分' + rankLabelPrefix;
            } else {
                data = sortedExams.map(exam => {
                    const record = (exam.subjects || []).find(s => s.name === selectedSubject);
                    if (!record) return null;
                    const rank = trendRankType === 'class' ? record.classRank : record.gradeRank;
                    return rank ? { name: exam.name, value: rank } : null;
                }).filter(e => e !== null);
                rankLabelPrefix = trendRankType === 'class' ? '班级' : '年级';
                label = selectedSubject + rankLabelPrefix + '排名';
            }

            const color = trendRankType === 'class' ? CHART_COLORS.blue : CHART_COLORS.purple;
            const bgColor = trendRankType === 'class' ? CHART_COLORS.blueBg : CHART_COLORS.purpleBg;

            zoomTrendChart.data.labels = data.map(e => e.name);
            zoomTrendChart.data.datasets[0].data = data.map(e => e.value);
            zoomTrendChart.data.datasets[0].label = label;
            zoomTrendChart.data.datasets[0].borderColor = color;
            zoomTrendChart.data.datasets[0].backgroundColor = bgColor;
            zoomTrendChart.data.datasets[0].pointBackgroundColor = color;
            zoomTrendChart.options.scales.y.reverse = true;
            zoomTrendChart.options.scales.y.beginAtZero = true;
            zoomTrendChart.options.scales.y.max = undefined;
            zoomTrendChart.options.scales.y.title = {
                display: true,
                text: rankLabelPrefix + '（↑ 进步）',
                color: '#6b6560',
                font: { size: 12 }

        // 动态更新成绩输入框的最大值（不能超过满分）
        function updateScoreMax() {

            const scoreInput = document.getElementById('scoreValue');

        // ===== 批量填写 =====
        let batchList = [];

        function openBatchModal() {
            if (!currentExamId) {
                showToast({ icon: '💡', iconType: 'info', title: '提示', message: '请先选择一个考试' });
                return;
            }
            const exams = getExams(getActiveProfileId());
            const exam = exams.find(e => e.id === currentExamId);
            if (!exam) return;

            batchList = (exam.subjects || []).map(s => ({
                name: s.name,
                score: s.score !== undefined ? String(s.score) : '',
                classRank: s.classRank ? String(s.classRank) : '',
                gradeRank: s.gradeRank ? String(s.gradeRank) : '',
                fullScore: s.fullScore || 100
            }));

            if (batchList.length === 0) {
                batchList.push({ name: '', score: '', classRank: '', gradeRank: '', fullScore: 100 });
            }

            renderBatchTable();
            document.getElementById('newBatchSubject').value = '';
            document.getElementById('batchModal').classList.add('active');
        }

        function closeBatchModal() {
            document.getElementById('batchModal').classList.remove('active');
            batchList = [];
        }

        function renderBatchTable() {
            // 先同步所有 input 当前值到 batchList
            const tbody = document.getElementById('batchTableBody');
            tbody.querySelectorAll('.batch-input').forEach(input => {
                const idx = parseInt(input.dataset.idx);
                const field = input.dataset.field;
                if (!isNaN(idx) && field && batchList[idx]) {
                    batchList[idx][field] = input.value;
                }
            });

            tbody.innerHTML = batchList.map((s, i) => `
                <tr>
                    <td class="batch-col-name"><input type="text" class="form-control batch-input" value="${escHtml(s.name)}" data-idx="${i}" data-field="name" placeholder="科目名"></td>
                    <td class="batch-col-score"><input type="number" class="form-control batch-input" value="${s.score}" data-idx="${i}" data-field="score" placeholder="分数"></td>
                    <td class="batch-col-rank"><input type="number" class="form-control batch-input" value="${s.classRank}" data-idx="${i}" data-field="classRank" placeholder="选填"></td>
                    <td class="batch-col-rank"><input type="number" class="form-control batch-input" value="${s.gradeRank}" data-idx="${i}" data-field="gradeRank" placeholder="选填"></td>
                    <td class="batch-col-del"><button type="button" class="batch-del-btn" data-idx="${i}">&times;</button></td>
                </tr>
            `).join('');

            // 绑定 input 事件（值同步到 batchList）
            tbody.querySelectorAll('.batch-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    const field = e.target.dataset.field;
                    batchList[idx][field] = e.target.value;
                });
            });

            // 删除按钮用事件委托
            tbody.querySelectorAll('.batch-del-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    removeBatchSubject(parseInt(e.currentTarget.dataset.idx));
                });
            });
        }

        function escHtml(str) {
            if (str === null || str === undefined) return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        function removeBatchSubject(index) {
            if (batchList.length <= 1) {
                showToast({ icon: '💡', iconType: 'info', title: '提示', message: '至少保留一个科目' });
                return;
            }
            batchList.splice(index, 1);
            renderBatchTable();
        }

        function addBatchSubject() {
            const name = document.getElementById('newBatchSubject').value.trim();
            if (!name) {
                showToast({ icon: '💡', iconType: 'info', title: '提示', message: '请输入科目名' });
                return;
            }

            // 从历史考试中查找该科目的满分值
            const allExams = getExams(getActiveProfileId()).filter(ex => ex.id !== currentExamId);
            let fullScore = 100;
            for (const exam of allExams) {
                const found = (exam.subjects || []).find(s => s.name === name);
                if (found && found.fullScore) {
                    fullScore = found.fullScore;
                    break;
                }
            }

            batchList.push({ name, score: '', classRank: '', gradeRank: '', fullScore });
            document.getElementById('newBatchSubject').value = '';
            renderBatchTable();
        }

        async function saveBatch() {
            // 先同步所有 input 当前值
            const tbody = document.getElementById('batchTableBody');
            tbody.querySelectorAll('.batch-input').forEach(input => {
                const idx = parseInt(input.dataset.idx);
                const field = input.dataset.field;
                if (!isNaN(idx) && field && batchList[idx]) {
                    batchList[idx][field] = input.value;
                }
            });

            const validSubjects = batchList.filter(s => s.name.trim());
            if (validSubjects.length === 0) {
                showToast({ icon: '💡', iconType: 'info', title: '提示', message: '至少填写一个科目' });
                return;
            }

            for (const s of validSubjects) {
                if (s.score === '' || isNaN(Number(s.score))) {
                    showToast({ icon: '💡', iconType: 'info', title: '提示', message: `「${s.name}」成绩无效` });
                    return;
                }
            }

            const allExams = getExamsAll();
            const target = allExams.find(e => e.id === currentExamId);
            if (!target) return;

            target.subjects = validSubjects.map(s => ({
                name: s.name.trim(),
                score: Number(s.score),
                fullScore: isNaN(Number(s.fullScore)) ? 100 : Number(s.fullScore),
                classRank: s.classRank ? Number(s.classRank) : undefined,
                gradeRank: s.gradeRank ? Number(s.gradeRank) : undefined
            }));

            saveExams(allExams);
            closeBatchModal();
            await refreshAll();
            showToast({ icon: '✅', iconType: 'success', title: '成功', message: '成绩已批量保存' });
        }

        function editExam(examId) {
            openExamModal(examId);
        }

        // 删除考试 - 使用自定义确认框
        let pendingDeleteExamId = null;
        
        async function deleteExam(examId) {
            pendingDeleteExamId = examId;
            const exams = getExams(getActiveProfileId());
            const exam = exams.find(e => e.id == examId);
            document.getElementById('confirmModalTitle').textContent = '确定删除考试？';
            document.getElementById('confirmModalMessage').textContent = exam ? `「${exam.name}」的所有成绩将被删除` : '此操作不可撤销';
            document.getElementById('confirmModal').classList.add('active');
        }

        // 确认删除
        document.getElementById('confirmModalOk').addEventListener('click', async function() {
            if (_confirmCallback) {
                await _confirmCallback();
                _confirmCallback = null;
            }
            if (pendingDeleteExamId !== null) {
                const allExams = getExamsAll();
                const newExams = allExams.filter(e => e.id != pendingDeleteExamId);
                saveExams(newExams);
                
                if (currentExamId == pendingDeleteExamId) {
                    currentExamId = null;
                }
                
                refreshAll();
                pendingDeleteExamId = null;
            }
            document.getElementById('confirmModal').classList.remove('active');
        });

        // 取消删除
        document.getElementById('confirmModalCancel').addEventListener('click', function() {
            pendingDeleteExamId = null;
            _confirmCallback = null;
            document.getElementById('confirmModal').classList.remove('active');
        });

        // 点击遮罩关闭
        document.getElementById('confirmModal').addEventListener('click', function(e) {
            if (e.target === this) {
                pendingDeleteExamId = null;
                _confirmCallback = null;
                this.classList.remove('active');
            }
        });

        // ===== 表单提交 =====
        document.getElementById('examForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const exams = getExams(getActiveProfileId());
            const examId = this.dataset.examId;
            
            const examData = {
                profileId: getActiveProfileId(),
                name: document.getElementById('examName').value,
                startDate: document.getElementById('examStartDate').value,
                endDate: document.getElementById('examEndDate').value,
                notes: document.getElementById('examNotes').value,
                classTotal: parseInt(document.getElementById('examClassTotal').value) || null,
                gradeTotal: parseInt(document.getElementById('examGradeTotal').value) || null,
                totalClassRank: parseInt(document.getElementById('examTotalClassRank').value) || null,
                totalGradeRank: parseInt(document.getElementById('examTotalGradeRank').value) || null,
                subjects: []
            };
            
            if (examId) {
                const index = exams.findIndex(e => e.id == examId);
                if (index !== -1) {
                    examData.id = parseInt(examId);
                    examData.subjects = exams[index].subjects || [];
                    // 保留编辑前已有的字段（如果新值为空则保留旧值）
                    if (!examData.classTotal && exams[index].classTotal) examData.classTotal = exams[index].classTotal;
                    if (!examData.gradeTotal && exams[index].gradeTotal) examData.gradeTotal = exams[index].gradeTotal;
                    if (!examData.totalClassRank && exams[index].totalClassRank) examData.totalClassRank = exams[index].totalClassRank;
                    if (!examData.totalGradeRank && exams[index].totalGradeRank) examData.totalGradeRank = exams[index].totalGradeRank;
                    exams[index] = examData;
                }
            } else {
                examData.id = Date.now();
                examData.createdAt = new Date().toISOString();
                exams.push(examData);
            }
            
            saveExams(exams);
            closeExamModal();
            currentExamId = examData.id;
            await refreshAll();
        });

        document.getElementById('scoreForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const exams = getExams(getActiveProfileId());
            const examIndex = exams.findIndex(e => e.id === currentExamId);
            
            if (examIndex === -1) return;
            
            if (!exams[examIndex].subjects) {
                exams[examIndex].subjects = [];
            }
            
            const subjectData = {
                name: document.getElementById('subjectName').value,
                score: parseInt(document.getElementById('scoreValue').value),
                fullScore: parseInt(document.getElementById('scoreFull').value) || 100,
                classRank: parseInt(document.getElementById('scoreClassRank').value) || null,
                gradeRank: parseInt(document.getElementById('scoreGradeRank').value) || null,
                notes: document.getElementById('scoreNotes').value
            };
            
            // 检查是编辑还是新增
            const subjectIndex = this.dataset.subjectIndex;
            if (subjectIndex !== undefined) {
                // 编辑模式：更新现有科目
                exams[examIndex].subjects[subjectIndex] = subjectData;
            } else {
                // 新增模式：添加新科目
                exams[examIndex].subjects.push(subjectData);
            }
            
            saveExams(exams);
            closeScoreModal();
            await refreshAll();
        });

        // ===== 档案 UI =====
        function renderProfileSwitcher() {
            const profiles = getProfiles();
            const activeId = getActiveProfileId();
            const select = document.getElementById('profileSelect');
            select.innerHTML = profiles.map((p, i) =>
                `<option value="${i}" ${p.id === activeId ? 'selected' : ''}>${p.name}</option>`
            ).join('');
        }

        function renderProfileManager() {
            const profiles = getProfiles();
            const activeId = getActiveProfileId();
            const container = document.getElementById('profileList');

            if (profiles.length === 0) {
                container.innerHTML = '<div class="profile-empty">暂无档案</div>';
                return;
            }

            container.innerHTML = profiles.map((p, i) => {
                const examCount = getExams(p.id).length;
                return `
                    <div class="profile-item" onclick="switchToProfile(${i})">
                        <div class="profile-item-info">
                            <div class="profile-item-name">
                                ${p.name}
                                ${p.id === activeId ? '<span class="active-badge">当前</span>' : ''}
                            </div>
                            <div class="profile-item-exams">${examCount} 条考试记录</div>
                        </div>
                        <div class="profile-item-actions" onclick="event.stopPropagation()">
                            <button class="share-profile-btn" onclick="openShareProfileReport(${i})" title="分享档案报告">📤 分享报告</button>
                            <div class="action-btns">
                                <button onclick="renameProfile(${i})" title="重命名">✎</button>
                                ${profiles.length > 1 ? `<button class="delete-profile-btn" onclick="confirmDeleteProfile(${i})" title="删除档案">🗑</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchToProfile(index) {
            const profiles = getProfiles();
            const id = profiles[index].id;
            // 已经是当前档案则不切换
            if (id === getActiveProfileId()) return;
            setActiveProfileId(id);
            renderProfileSwitcher();
            renderProfileManager();
            // 切换档案后，默认选中该档案下最新的考试
            const exams = getExams(id);
            if (exams.length > 0) {
                const sorted = [...exams].sort((a, b) => new Date(b.startDate || b.createdAt) - new Date(a.startDate || a.createdAt));
                currentExamId = sorted[0].id;
            } else {
                currentExamId = null;
            }
            refreshAll();
        }

        function renameProfile(index) {
            const profiles = getProfiles();
            const p = profiles[index];
            if (!p) return;
            // 找到对应的 profile-item，把名称替换为输入框
            const items = document.querySelectorAll('.profile-item');
            for (const item of items) {
                if (!item.getAttribute('onclick')?.includes(`switchToProfile(${index})`)) continue;
                const nameEl = item.querySelector('.profile-item-name');
                if (!nameEl) continue;
                nameEl.innerHTML = `<input type="text" class="rename-input" value="${p.name}" maxlength="20" style="flex:1;padding:4px 8px;border:1px solid var(--accent-blue);border-radius:6px;font-size:0.9rem;font-family:inherit;outline:none;">`;
                const input = nameEl.querySelector('input');
                input.focus();
                input.select();
                const finish = () => {
                    const v = input.value.trim();
                    if (v && v !== p.name) updateProfile(p.id, v);
                    renderProfileSwitcher();
                    renderProfileManager();
                };
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') finish();
                    if (e.key === 'Escape') renderProfileManager();
                });
                input.addEventListener('blur', finish);
                break;
            }
        }

        function confirmDeleteProfile(index) {
            const profiles = getProfiles();
            const p = profiles[index];
            if (!p) return;
            const examCount = getExams(p.id).length;
            const msg = examCount > 0
                ? `该档案下的 ${examCount} 条考试记录将一并删除，此操作不可撤销！`
                : '此操作不可撤销';

            showConfirmDialog({
                icon: '🗑',
                title: `确定删除档案「${p.name}」？`,
                message: msg,
                okText: '删除',
                okClass: 'confirm-ok-btn',
                onConfirm: () => {
                    deleteProfile(p.id);
                    renderProfileSwitcher();
                    renderProfileManager();
                    refreshAll();
                }
            });
        }

        let _confirmCallback = null;

            ];

                        subject.score,

                        subject.gradeRank || '',
                        subject.notes || ''
                    ]);
                });
                // 总分排名信息（放在第一个科目行追加备注，或者单独一行）
                // 这里用单独一行来表示总分排名
                if (exam.totalClassRank || exam.totalGradeRank) {
                    const peopleInfo = [];
                    if (exam.classTotal) peopleInfo.push('班级' + exam.classTotal + '人');
                    if (exam.gradeTotal) peopleInfo.push('年级' + exam.gradeTotal + '人');
                    worksheetData.push([
                        exam.name,
                        date,
                        '【总分】',
                        (exam.subjects || []).reduce((sum, s) => sum + s.score, 0),
                        '',
                        exam.totalClassRank || '',
                        exam.totalGradeRank || '',
                        peopleInfo.join('，') || ''
                    ]);
                }
            });
            
            const ws = XLSX.utils.aoa_to_sheet(worksheetData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '成绩记录');

        document.getElementById('importBtn').addEventListener('click', function() {

        document.getElementById('importFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // 读取第一个表格（成绩记录）
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    if (jsonData.length <= 1) {
                        showToast({ icon: '📄', iconType: 'info', title: '提示', message: 'Excel文件没有数据' });
                        return;
                    }
                    
                    // 解析Excel数据
                    const examsMap = {};
                    for (let i = 1; i < jsonData.length; i++) {
                        const row = jsonData[i];
                        if (!row[0]) continue;
                        
                        const examName = row[0];
                        const date = row[1] || '';
                        const subjectName = row[2];
                        const score = parseFloat(row[3]) || 0;
                        const fullScore = parseFloat(row[4]) || 100;
                        const classRank = parseFloat(row[5]) || null;
                        const gradeRank = parseFloat(row[6]) || null;
                        const notes = row[7] || '';
                        
                        if (!examsMap[examName]) {
                            examsMap[examName] = {
                                id: Date.now() + i,
                                name: examName,
                                startDate: date,
                                subjects: []
                            };
                        }
                        
                        // 处理总分排名行（科目名以【总分】标记）
                        if (subjectName && subjectName.startsWith('【总分】')) {
                            if (classRank) examsMap[examName].totalClassRank = classRank;
                            if (gradeRank) examsMap[examName].totalGradeRank = gradeRank;
                            // 从备注中提取班级人数（格式："班级45人"）
                            if (notes) {
                                const match = notes.match(/班级(\d+)人/);
                                if (match) examsMap[examName].classTotal = parseInt(match[1]);
                                const gradeMatch = notes.match(/年级(\d+)人/);
                                if (gradeMatch) examsMap[examName].gradeTotal = parseInt(gradeMatch[1]);
                            }
                        } else {
                            examsMap[examName].subjects.push({
                                name: subjectName,
                                score: score,
                                fullScore: fullScore,
                                classRank: classRank,
                                gradeRank: gradeRank,
                                notes: notes
                            });
                        }
                    }
                    
                    const importedExams = Object.values(examsMap);
                    
                    if (importedExams.length > 0) {
                        // 合并数据：同名同日期的覆盖，其他新增
                        const existingExams = getExams(getActiveProfileId());
                        const mergedExams = [...existingExams];
                        
                        importedExams.forEach(importedExam => {
                            importedExam.profileId = getActiveProfileId();
                            const existingIndex = mergedExams.findIndex(e => 
                                e.name === importedExam.name && e.startDate === importedExam.startDate
                            );
                            if (existingIndex >= 0) {
                                // 覆盖原有数据，保留ID
                                mergedExams[existingIndex] = { ...importedExam, id: mergedExams[existingIndex].id };
                            } else {
                                // 新增
                                mergedExams.push(importedExam);
                            }
                        });
                        
                        // 按开始日期排序，最新的在前
                        mergedExams.sort((a, b) => {
                            const dateA = a.startDate || '1970-01-01';
                            const dateB = b.startDate || '1970-01-01';
                            return new Date(dateB) - new Date(dateA);
                        });
                        
                        // 计算覆盖数量
                        const coverCount = mergedExams.length - existingExams.length < 0 ? 0 : importedExams.length - (mergedExams.length - existingExams.length);
                        
                        if (coverCount === 0) {
                            // 没有覆盖数据，直接导入
                            saveExams(mergedExams);
                            refreshAll();
                            showToast({ icon: '📥', title: '导入成功', message: `已导入 ${importedExams.length} 条考试记录` });
                        } else {
                            // 有覆盖数据，弹窗确认
                            showConfirmDialog({
                                icon: '🔄',
                                iconType: 'info',
                                title: '数据重复',
                                message: `发现 ${coverCount} 个考试记录与已有数据重名，将用导入数据覆盖原有记录。`,
                                okText: '覆盖导入',
                                okClass: 'confirm-ok-btn blue',
                                onConfirm: function() {
                                    saveExams(mergedExams);
                                    refreshAll();
                                    showToast({ icon: '📥', title: '导入成功', message: `已导入 ${importedExams.length} 条考试记录（覆盖 ${coverCount} 条）` });
                                }
                            });
                        }
                    } else {
                        showToast({ icon: '⚠️', iconType: 'danger', title: '导入失败', message: '无法解析Excel文件，请检查格式' });
                    }
                } catch (err) {
                    showToast({ icon: '❌', iconType: 'danger', title: '导入失败', message: '文件解析失败: ' + err.message });
                }
            };
            reader.readAsArrayBuffer(file);
            this.value = '';
        });
